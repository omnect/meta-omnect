CONFIG_ENV_SIZE=0x10000
CONFIG_ENV_OFFSET=0x100000
# CONFIG_ENV_IS_IN_FAT is not set
CONFIG_ENV_IS_IN_MMC=y
# u-boot renamed SYS_REDUNDAND_ENVIRONMENT -> ENV_REDUNDANT; list both so the
# fragment works whether the recipe's u-boot predates or postdates the rename
# (rpi 2026.01 uses ENV_REDUNDANT, phytec 2024.04 uses SYS_REDUNDAND_ENVIRONMENT).
# oldconfig keeps the one its Kconfig defines and drops the other.
CONFIG_SYS_REDUNDAND_ENVIRONMENT=y
CONFIG_ENV_REDUNDANT=y
CONFIG_ENV_OFFSET_REDUND=0x120000
