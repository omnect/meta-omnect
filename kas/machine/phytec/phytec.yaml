# kas config file

header:
  version: 11

repos:
  ext/meta-phytec:
    url: "https://github.com/phytec/meta-phytec"
    # was held at our 5.0.15 release due to https://github.com/phytec/linux-phytec-imx/issues/2;
    # re-verify that issue against the wrynose i.MX 6.18 kernel.
    branch: "wrynose"
    commit: "d4afe1789657da17b9a87bb7e942ee9a0ed1274c"
    patches:
      p001:
        repo: "meta-omnect"
        path: "kas/patches/meta-phytec_layerdir.patch"
  ext/meta-freescale:
    url: "https://github.com/Freescale/meta-freescale.git"
    branch: "wrynose"
    commit: "25ce7c63c234af499674392751c67aaae8f43958"
    patches:
      p001:
        repo: "meta-omnect"
        path: "kas/patches/meta-freescale_layerdir.patch"
  ext/meta-imx:
    url: "https://github.com/nxp-imx/meta-imx.git"
    branch: "wrynose-6.18.20-2.0.0"
    commit: "1001299baf5a3b468c93e381c62aeb486a639aa1"
    layers:
      # meta-imx-sdk (fsl-sdk-release) dropped: on wrynose it pulls in
      # freescale-distro + perl-layer, and we mask all of its recipes anyway
      # (headless device, no graphics/multimedia). meta-imx-bsp only depends on
      # freescale-layer.
      meta-imx-bsp:
    patches:
      p001:
        repo: "meta-omnect"
        path: "kas/patches/meta-imx_layerdir.patch"
  ext/meta-arm:
    url: "https://git.yoctoproject.org/meta-arm"
    branch: "wrynose"
    commit: "caa36c53f796beb25d9b9f58b1b7a492e9987e15"
    layers:
      meta-arm:
      meta-arm-toolchain:
    patches:
      p001:
        repo: "meta-omnect"
        path: "kas/patches/meta-arm_layerdir.patch"
env:
  ACCEPT_FSL_EULA: "0"
  # Drop upstream meta-phytec "lack of whitespace around the assignment" bitbake
  # parse warnings from the console. BB_LOGCONFIG's dictConfig runs in the bitbake
  # UI process, whose sys.path is only bitbake/lib, so the filter module is reached
  BB_LOGCONFIG: "${LAYERDIR_omnect}/files/logging/bb-logging.json"
  PYTHONPATH: "/yocto-build/meta-omnect/files/logging"
