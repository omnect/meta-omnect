# Compile SELinux into the kernel so it can be selected at boot by appending
# `selinux` to the pinned CONFIG_LSM list via `lsm=` (see audit.cfg / doc/mac_lsm.md).
# DAC stays the default LSM; SELinux is inactive until explicitly enabled on the
# kernel command line.
CONFIG_SECURITY=y
CONFIG_SECURITY_NETWORK=y
CONFIG_SECURITY_SELINUX=y
CONFIG_SECURITY_SELINUX_BOOTPARAM=y
CONFIG_SECURITY_SELINUX_AVC_STATS=y
