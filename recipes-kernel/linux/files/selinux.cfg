# Compile SELinux into the kernel so it can be selected at boot via
# `security=selinux` / `lsm=`. DAC stays the default LSM (see audit.cfg);
# SELinux is inactive until explicitly enabled on the kernel command line.
CONFIG_SECURITY=y
CONFIG_SECURITY_NETWORK=y
CONFIG_SECURITY_SELINUX=y
CONFIG_SECURITY_SELINUX_BOOTPARAM=y
CONFIG_SECURITY_SELINUX_AVC_STATS=y
