CONFIG_AUDIT=y
CONFIG_AUDITSYSCALL=y
CONFIG_SECURITY_NETWORK=y
# AUDIT option might depend on APPARMOR option so enable it; but keep DAC as
# default
CONFIG_SECURITY_APPARMOR=y
CONFIG_DEFAULT_SECURITY_DAC=y
# Pin the active LSM list to the minor LSMs only (no major MAC LSM) so DAC stays
# the default. apparmor/selinux are compiled in but NOT listed here, so neither
# initializes out of the box. To activate one per device, append it to this list
# on the kernel command line via lsm= (see doc/mac_lsm.md). Note: the legacy
# security= parameter only filters among major LSMs already in the list - it does
# not add one - so lsm= is the correct knob. Pinning makes that documented lsm=
# string stable and explicit instead of relying on the kernel's implicit
# DEFAULT_SECURITY_DAC ordering.
CONFIG_LSM="landlock,lockdown,yama,loadpin,safesetid,bpf"
