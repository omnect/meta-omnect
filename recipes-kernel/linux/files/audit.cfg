CONFIG_AUDIT=y
CONFIG_AUDITSYSCALL=y
CONFIG_SECURITY_NETWORK=y
# AUDIT option might depend on APPARMOR option so enable it; but keep DAC as
# default
CONFIG_SECURITY_APPARMOR=y
CONFIG_DEFAULT_SECURITY_DAC=y
# apparmor is deliberately NOT listed: it stays compiled-in but inactive until
# added via lsm= on the kernel cmdline (see doc/mac_lsm.md).
CONFIG_LSM="landlock,lockdown,yama,loadpin,safesetid,bpf"
